<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices — فریلنس یار</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" aria-label="FreelanceHub home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      فریلنس یار
    </a>
    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-menu" role="list">
      <li><a href="index.html" class="nav-link">Dashboard</a></li>
      <li><a href="clients.html" class="nav-link">Clients</a></li>
      <li><a href="invoices.html" class="nav-link">Invoices</a></li>
    </ul>
  </nav>
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Invoices</h1>
      <p class="page-subtitle">Create, track and manage your invoices</p>
    </div>
    <div class="page-grid">
      <aside>
        <div class="form-card">
          <h2 id="form-heading">New Invoice</h2>
          <form id="invoice-form" novalidate>
            <div class="form-group">
              <label for="invoice-client">Client <span class="required" aria-hidden="true">*</span></label>
              <select id="invoice-client" name="invoice-client" class="form-control" required>
                <option value="">Select a client…</option>
              </select>
              <div class="field-error" role="alert"></div>
            </div>
            <div class="form-group">
              <label for="invoice-service">Service Title <span class="required" aria-hidden="true">*</span></label>
              <input type="text" id="invoice-service" name="invoice-service" class="form-control" placeholder="Website Redesign" required>
              <div class="field-error" role="alert"></div>
            </div>
            <div class="form-group">
              <label for="invoice-description">Description</label>
              <textarea id="invoice-description" name="invoice-description" class="form-control" placeholder="Brief description…" rows="3"></textarea>
              <div class="field-error" role="alert"></div>
            </div>
            <div class="form-group">
              <label for="invoice-amount">Amount (USD) <span class="required" aria-hidden="true">*</span></label>
              <input type="number" id="invoice-amount" name="invoice-amount" class="form-control" placeholder="0.00" min="0.01" step="0.01" required>
              <div class="field-error" role="alert"></div>
            </div>
            <div class="form-group">
              <label for="invoice-date">Date <span class="required" aria-hidden="true">*</span></label>
              <input type="date" id="invoice-date" name="invoice-date" class="form-control" required>
              <div class="field-error" role="alert"></div>
            </div>
            <div class="form-actions">
              <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Create Invoice</button>
              <button type="button" id="cancel-edit" class="btn btn-secondary btn-full" style="display:none">Cancel</button>
            </div>
          </form>
        </div>
      </aside>
      <div>
        <div class="table-card">
          <div class="table-header">
            <h2>All Invoices <span class="count-badge" id="invoice-count" aria-live="polite">0</span></h2>
            <div class="filter-tabs" role="group" aria-label="Filter invoices">
              <button data-filter="all" class="active">All</button>
              <button data-filter="paid">Paid</button>
              <button data-filter="unpaid">Unpaid</button>
            </div>
          </div>
          <div class="table-wrap">
            <table aria-label="Invoices list">
              <thead>
                <tr>
                  <th scope="col">Invoice #</th>
                  <th scope="col">Client</th>
                  <th scope="col">Service</th>
                  <th scope="col">Amount</th>
                  <th scope="col">Date</th>
                  <th scope="col">Status</th>
                  <th scope="col">Actions</th>
                </tr>
              </thead>
              <tbody id="invoices-tbody">
                <tr><td colspan="7" class="empty-state"><div><p>Loading…</p></div></td></tr>
              </tbody>
            </table>
          </div>
          <div class="totals-bar" role="region" aria-label="Invoice totals">
            <div class="total-item">
              <div class="total-label">Total Revenue</div>
              <div class="total-value amber" id="total-revenue">$0.00</div>
            </div>
            <div class="total-item">
              <div class="total-label">Paid</div>
              <div class="total-value green" id="total-paid">$0.00</div>
            </div>
            <div class="total-item">
              <div class="total-label">Outstanding</div>
              <div class="total-value red" id="total-unpaid">$0.00</div>
            </div>
            <div class="total-item">
              <div class="total-label">Paid / Unpaid</div>
              <div class="total-value" style="font-size:.95rem">
                <span id="paid-count">0</span> / <span id="unpaid-count">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="toast" class="toast toast-success" role="status" aria-live="polite"></div>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/invoices.js"></script>
</body>
</html>
